<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Deck sem cover no slide 01</title>
    <link rel="stylesheet" href="elven-deck.css" />
  </head>
  <body>
    <main class="deck">
      <section class="slide">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Seção</div>
          <h2>Quebra a regra L6: o primeiro slide não tem a variante cover.</h2>
        </div>
      </section>
      <section class="slide">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Outra seção</div>
          <h2>Todo o resto está correto.</h2>
        </div>
      </section>
    </main>
  </body>
</html>
